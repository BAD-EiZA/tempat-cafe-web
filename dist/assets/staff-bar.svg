<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" fill="none" role="img" aria-label="Staf kafe">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#wall)"/>
  <!-- back shelves -->
  <rect x="60" y="80" width="680" height="200" rx="8" fill="#14201a" fill-opacity=".5"/>
  <rect x="90" y="110" width="80" height="12" fill="#d97706" fill-opacity=".4"/>
  <rect x="200" y="110" width="80" height="12" fill="#d97706" fill-opacity=".3"/>
  <rect x="310" y="110" width="80" height="12" fill="#d97706" fill-opacity=".4"/>
  <rect x="90" y="150" width="60" height="80" rx="6" fill="#f4f1ea" fill-opacity=".12"/>
  <rect x="170" y="160" width="50" height="70" rx="6" fill="#f4f1ea" fill-opacity=".1"/>
  <rect x="240" y="145" width="55" height="85" rx="6" fill="#d97706" fill-opacity=".25"/>
  <rect x="320" y="155" width="70" height="75" rx="6" fill="#f4f1ea" fill-opacity=".1"/>
  <!-- bar counter -->
  <rect x="40" y="320" width="720" height="200" rx="16" fill="#171d19"/>
  <rect x="40" y="320" width="720" height="36" fill="#2d6a4f"/>
  <rect x="40" y="350" width="720" height="8" fill="#d97706" fill-opacity=".35"/>
  <!-- barista figure (simple geometric) -->
  <circle cx="400" cy="240" r="42" fill="#f4f1ea" fill-opacity=".85"/>
  <rect x="360" y="280" width="80" height="100" rx="20" fill="#f4f1ea" fill-opacity=".9"/>
  <rect x="370" y="300" width="60" height="50" rx="8" fill="#1b4332"/>
  <!-- apron accent -->
  <path d="M380 320 H420 V380 H380 Z" fill="#d97706" fill-opacity=".5"/>
  <!-- arms / cup -->
  <rect x="320" y="310" width="50" height="16" rx="8" fill="#f4f1ea" fill-opacity=".8"/>
  <rect x="430" y="310" width="50" height="16" rx="8" fill="#f4f1ea" fill-opacity=".8"/>
  <ellipse cx="300" cy="330" rx="28" ry="12" fill="#1e2621"/>
  <path d="M280 290 C280 270 320 270 320 290 V330 H280 Z" fill="#fffefb"/>
  <!-- second staff silhouette -->
  <circle cx="560" cy="250" r="36" fill="#f4f1ea" fill-opacity=".7"/>
  <rect x="528" y="285" width="64" height="90" rx="16" fill="#f4f1ea" fill-opacity=".75"/>
  <rect x="538" y="305" width="44" height="40" rx="6" fill="#2d6a4f"/>
  <!-- floor -->
  <rect x="0" y="520" width="800" height="120" fill="#0f1411"/>
  <rect x="0" y="520" width="800" height="4" fill="#d9e0d8" fill-opacity=".1"/>
  <!-- tray on counter -->
  <ellipse cx="200" cy="340" rx="60" ry="14" fill="#0f1411" fill-opacity=".5"/>
  <circle cx="175" cy="330" r="14" fill="#d97706" fill-opacity=".6"/>
  <circle cx="210" cy="328" r="12" fill="#f4f1ea" fill-opacity=".3"/>
  <circle cx="240" cy="332" r="10" fill="#2d6a4f"/>
</svg>
