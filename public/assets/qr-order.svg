  <!-- QR card on table -->
  <rect x="300" y="300" width="140" height="140" rx="12" fill="#fffefb" stroke="#d9e0d8" stroke-width="2"/>
  <rect x="320" y="320" width="40" height="40" fill="#1b4332"/>
  <rect x="380" y="320" width="40" height="40" fill="#1b4332"/>
  <rect x="320" y="380" width="40" height="40" fill="#1b4332"/>
  <rect x="372" y="372" width="16" height="16" fill="#1b4332"/>
  <rect x="396" y="372" width="16" height="16" fill="#1b4332"/>
  <rect x="372" y="396" width="16" height="16" fill="#1b4332"/>
