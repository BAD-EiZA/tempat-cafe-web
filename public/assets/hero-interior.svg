<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" fill="none" role="img" aria-label="Interior kafe">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="55%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#0f1411"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="960" height="1200" fill="url(#sky)"/>
  <rect width="960" height="1200" fill="url(#warm)"/>
  <!-- floor -->
  <path d="M0 780 L960 720 V1200 H0 Z" fill="#14201a"/>
  <path d="M0 780 L960 720" stroke="#d9e0d8" stroke-opacity=".12" stroke-width="2"/>
  <!-- back wall panels -->
  <rect x="80" y="200" width="800" height="520" rx="8" fill="#171d19" stroke="#d9e0d8" stroke-opacity=".1"/>
  <rect x="120" y="240" width="280" height="200" rx="6" fill="#1e2621"/>
  <rect x="420" y="240" width="200" height="200" rx="6" fill="#1e2621"/>
  <rect x="640" y="240" width="200" height="200" rx="6" fill="#1e2621"/>
  <!-- shelves -->
  <rect x="140" y="280" width="240" height="8" fill="#d97706" fill-opacity=".5"/>
  <rect x="140" y="340" width="240" height="8" fill="#d97706" fill-opacity=".35"/>
  <circle cx="180" cy="310" r="14" fill="#d97706" fill-opacity=".7"/>
  <circle cx="230" cy="310" r="12" fill="#f4f1ea" fill-opacity=".25"/>
  <circle cx="275" cy="310" r="16" fill="#d97706" fill-opacity=".45"/>
  <rect x="450" y="290" width="40" height="90" rx="4" fill="#2d6a4f"/>
  <rect x="510" y="310" width="36" height="70" rx="4" fill="#40916c"/>
  <rect x="560" y="300" width="32" height="80" rx="4" fill="#2d6a4f"/>
  <!-- counter -->
  <rect x="160" y="560" width="640" height="160" rx="12" fill="#1b4332"/>
  <rect x="160" y="560" width="640" height="28" rx="8" fill="#2d6a4f"/>
  <rect x="200" y="620" width="120" height="60" rx="8" fill="#0f1411" fill-opacity=".4"/>
  <rect x="360" y="620" width="80" height="60" rx="8" fill="#d97706" fill-opacity=".25"/>
  <!-- espresso machine silhouette -->
  <rect x="680" y="500" width="90" height="60" rx="8" fill="#0f1411" fill-opacity=".5"/>
  <rect x="700" y="470" width="50" height="40" rx="6" fill="#0f1411" fill-opacity=".45"/>
  <!-- tables -->
  <ellipse cx="240" cy="900" rx="90" ry="28" fill="#1e2621"/>
  <rect x="228" y="900" width="24" height="100" fill="#1e2621"/>
  <ellipse cx="480" cy="940" rx="100" ry="30" fill="#1e2621"/>
  <rect x="468" y="940" width="24" height="90" fill="#1e2621"/>
  <ellipse cx="720" cy="900" rx="90" ry="28" fill="#1e2621"/>
  <rect x="708" y="900" width="24" height="100" fill="#1e2621"/>
  <!-- chairs -->
  <ellipse cx="180" cy="930" rx="28" ry="14" fill="#2d6a4f" fill-opacity=".6"/>
  <ellipse cx="300" cy="930" rx="28" ry="14" fill="#2d6a4f" fill-opacity=".6"/>
  <ellipse cx="420" cy="970" rx="28" ry="14" fill="#2d6a4f" fill-opacity=".6"/>
  <ellipse cx="540" cy="970" rx="28" ry="14" fill="#2d6a4f" fill-opacity=".6"/>
  <!-- pendant lamps -->
  <circle cx="300" cy="160" r="80" fill="url(#lamp)"/>
  <line x1="300" y1="80" x2="300" y2="140" stroke="#d97706" stroke-opacity=".4" stroke-width="2"/>
  <circle cx="300" cy="155" r="22" fill="#d97706" fill-opacity=".5"/>
  <circle cx="660" cy="140" r="70" fill="url(#lamp)"/>
  <line x1="660" y1="60" x2="660" y2="120" stroke="#d97706" stroke-opacity=".4" stroke-width="2"/>
  <circle cx="660" cy="135" r="20" fill="#d97706" fill-opacity=".45"/>
  <!-- window light -->
  <rect x="640" y="250" width="180" height="160" rx="4" fill="#f4f1ea" fill-opacity=".06"/>
</svg>
